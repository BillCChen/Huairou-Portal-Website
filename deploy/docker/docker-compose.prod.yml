name: portal-prod

services:
  postgres:
    image: ${PORTAL_POSTGRES_IMAGE:-postgres:16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portal}
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - portal_prod_postgres_data:/var/lib/postgresql/data
    networks:
      - portal_prod_net

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-portal}
      SECRET_KEY: ${PORTAL_SECRET_KEY}
      ADMIN_USERNAME: ${PORTAL_ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${PORTAL_ADMIN_PASSWORD}
      SMS_TEST_CODE: ${PORTAL_SMS_TEST_CODE:-000000}
      CORS_ORIGINS: ${PORTAL_CORS_ORIGINS}
      PASSWORD_RESET_ENABLED: ${PASSWORD_RESET_ENABLED:-true}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:-60}
      PASSWORD_RESET_DEV_OUTBOX_DIR: ${PASSWORD_RESET_DEV_OUTBOX_DIR:-/app/data/tmp/mail_outbox}
      PUBLIC_FRONTEND_BASE_URL: ${PUBLIC_FRONTEND_BASE_URL}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-dev_outbox}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Portal Website}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
      SMTP_REQUIRE_AUTH: ${SMTP_REQUIRE_AUTH:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORTAL_API_HOST_PORT:-18100}:8000"
    volumes:
      - portal_prod_data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - portal_prod_net

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/web.Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${PORTAL_WEB_PUBLIC_API_BASE:-https://huairou.tech/api/v1}
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${PORTAL_WEB_PUBLIC_API_BASE:-https://huairou.tech/api/v1}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORTAL_WEB_HOST_PORT:-13100}:3000"
    networks:
      - portal_prod_net

  admin:
    build:
      context: ../..
      dockerfile: deploy/docker/admin.Dockerfile
      args:
        VITE_API_BASE_URL: ${PORTAL_ADMIN_API_BASE:-https://huairou.tech/api/v1}
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${PORTAL_ADMIN_API_BASE:-https://huairou.tech/api/v1}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORTAL_ADMIN_HOST_PORT:-15174}:80"
    networks:
      - portal_prod_net

networks:
  portal_prod_net:

volumes:
  portal_prod_postgres_data:
  portal_prod_data:
