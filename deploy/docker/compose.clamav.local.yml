services:
  clamav:
    image: ${CLAMAV_IMAGE:-quay.io/ukhomeofficedigital/clamav:latest}
    entrypoint: ["/usr/sbin/clamd"]
    ports:
      - "127.0.0.1:3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "printf 'PING\\n' | nc 127.0.0.1 3310 | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
